name: .NET CI

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1

    - name: Restore NuGet Packages
      # هذا السطر يحل مشكلة الـ Restore اللي طالعة بالصورة 40
      run: nuget restore CarRentalSystem.csproj -PackagesDirectory packages

    - name: Build Project
      # هذا السطر يبني المشروع ويتأكد من وجود كل الملفات
      run: msbuild CarRentalSystem.csproj /p:Configuration=Release
